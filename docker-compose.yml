services:
  backend-http:
    build:
      context: ./backend
      dockerfile: Dockerfile.http
    depends_on:
      - minio
      - postgres
      - redis
    cpus: 0.01
    mem_limit: 6m
    container_name: app-backend-http
    env_file:
      - ./backend/.env
    networks:
      - internal
    restart: unless-stopped

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    depends_on:
      - minio
      - postgres
      - redis
    cpuset: "0-1"
    mem_limit: 8g
    container_name: app-backend-worker
    env_file:
      - ./backend/.env
    networks:
      - internal
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
    container_name: app-frontend
    ports:
      - "80:80"
    depends_on:
      - backend-http
    networks:
      - internal
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    container_name: app-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      # cf. https://hub.docker.com/_/postgres#initialization-scripts
      - ./backend/deployments/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: app-redis
    networks:
      - internal
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: app-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - internal
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: app-minio-init
    depends_on:
      - minio
    env_file:
      - ./backend/.env
    networks:
      - internal
    entrypoint: >
      /bin/sh -c "
      # 環境変数を使って alias を設定
      until (/usr/bin/mc alias set myminio http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY}) do 
        echo 'Waiting for MinIO...' && sleep 1; 
      done;
      
      # バケットの作成
      /usr/bin/mc mb --ignore-existing myminio/$${S3_BUCKET};
      
      # CORS設定
      echo \"{\\\"CORSRules\\\": [{\\\"AllowedOrigins\\\": [\\\"*\\\"], \\\"AllowedMethods\\\": [\\\"GET\\\",\\\"PUT\\\",\\\"POST\\\",\\\"HEAD\\\"], \\\"AllowedHeaders\\\": [\\\"*\\\"], \\\"ExposeHeaders\\\": [\\\"ETag\\\"]}]}\" > /tmp/cors.json;
      
      /usr/bin/mc cors set myminio/$${S3_BUCKET} /tmp/cors.json;
      
      echo 'MinIO initialization completed for bucket: $${S3_BUCKET}';
      exit 0;
      "

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  minio-data: